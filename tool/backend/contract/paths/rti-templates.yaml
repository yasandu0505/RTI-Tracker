/rti-templates:
  # Create a new RTI template
  post:
    summary: Create an RTI template
    operationId: createRTITemplate
    description: Creates a new RTI template. The file is uploaded to GitHub and its URL is returned in `file`.
    tags:
      - RTI Templates
    security:
      - opaqueBearerToken: []
    requestBody:
      required: true
      description: Multipart form data with template metadata and file.
      content:
        multipart/form-data:
          schema:
            $ref: "../components/schemas/RTITemplates.yaml#/RTITemplateRequest"
          encoding:
            file:
              contentType: text/markdown
    responses:
      "201":
        description: RTI template created successfully.
        content:
          application/json:
            schema:
              $ref: "../components/schemas/RTITemplates.yaml#/RTITemplateResponse"
            example:
              id: 3fa85f64-5717-4562-b3fc-2c963f66afa6
              title: Freedom of Information Request Template
              description: A standard template for filing RTI requests.
              file: templates/3fa85f64.md
              createdAt: "2026-03-31T09:00:00Z"
              updatedAt: "2026-03-31T09:00:00Z"
      "401":
        $ref: "../components/responses/Errors.yaml#/Unauthorized"
      "422":
        $ref: "../components/responses/Errors.yaml#/UnprocessableEntity"
      "500":
        $ref: "../components/responses/Errors.yaml#/InternalServerError"

  # List all RTI templates with pagination
  get:
    summary: List all RTI templates
    operationId: listRTITemplates
    description: Returns a paginated list of all RTI templates.
    tags:
      - RTI Templates
    security:
      - opaqueBearerToken: []
    parameters:
      - $ref: "../components/parameters/Pagination.yaml#/PageParam"
      - $ref: "../components/parameters/Pagination.yaml#/PageSizeParam"
    responses:
      "200":
        description: A paginated list of RTI templates.
        content:
          application/json:
            schema:
              $ref: "../components/schemas/RTITemplates.yaml#/RTITemplateListResponse"
            example:
              data:
                - id: 3fa85f64-5717-4562-b3fc-2c963f66afa6
                  title: Freedom of Information Request Template
                  description: A standard template for filing RTI requests.
                  file: templates/3fa85f64.md
                  createdAt: "2026-03-31T09:00:00Z"
                  updatedAt: "2026-03-31T09:00:00Z"
              pagination:
                page: 1
                pageSize: 20
                totalItems: 84
                totalPages: 5
      "401":
        $ref: "../components/responses/Errors.yaml#/Unauthorized"
      "500":
        $ref: "../components/responses/Errors.yaml#/InternalServerError"

/rti-templates/{id}:
  # Get a single RTI template by ID
  get:
    summary: Get an RTI template by ID
    operationId: getRTITemplateById
    description: Returns a single RTI template identified by its UUID.
    tags:
      - RTI Templates
    security:
      - opaqueBearerToken: []
    parameters:
      - $ref: "../components/parameters/object.yaml#/ObjectId"
    responses:
      "200":
        description: RTI template found and returned successfully.
        content:
          application/json:
            schema:
              $ref: "../components/schemas/RTITemplates.yaml#/RTITemplateResponse"
            example:
              id: 3fa85f64-5717-4562-b3fc-2c963f66afa6
              title: Freedom of Information Request Template
              description: A standard template for filing RTI requests.
              file: templates/3fa85f64.md
              createdAt: "2026-03-31T09:00:00Z"
              updatedAt: "2026-03-31T09:00:00Z"
      "401":
        $ref: "../components/responses/Errors.yaml#/Unauthorized"
      "404":
        $ref: "../components/responses/Errors.yaml#/NotFound"
      "500":
        $ref: "../components/responses/Errors.yaml#/InternalServerError"

  # Update an existing RTI template
  put:
    summary: Update an RTI template
    operationId: updateRTITemplate
    description: Fully replaces an RTI template. If a new file is provided, it will be uploaded to GitHub and the old one will be deleted; otherwise the existing URL is kept.
    tags:
      - RTI Templates
    security:
      - opaqueBearerToken: []
    parameters:
      - $ref: "../components/parameters/object.yaml#/ObjectId"
    requestBody:
      required: true
      description: Multipart form data with updated metadata and an optional new file.
      content:
        multipart/form-data:
          schema:
            type: object
            properties:
              title:
                type: string
                example: Updated RTI Request Template
              description:
                type: string
                example: Updated description for the RTI template.
              file:
                type: string
                format: binary
                description: Optional. New file to replace the existing one on GitHub.
          encoding:
            file:
              contentType: text/markdown
    responses:
      "200":
        description: RTI template updated successfully.
        content:
          application/json:
            schema:
              $ref: "../components/schemas/RTITemplates.yaml#/RTITemplateResponse"
            example:
              id: 3fa85f64-5717-4562-b3fc-2c963f66afa6
              title: Updated RTI Request Template
              description: Updated description for the RTI template.
              file: templates/3fa85f64-v2.md
              createdAt: "2026-03-31T09:00:00Z"
              updatedAt: "2026-03-31T09:00:00Z"
      "401":
        $ref: "../components/responses/Errors.yaml#/Unauthorized"
      "404":
        $ref: "../components/responses/Errors.yaml#/NotFound"
      "422":
        $ref: "../components/responses/Errors.yaml#/UnprocessableEntity"
      "500":
        $ref: "../components/responses/Errors.yaml#/InternalServerError"

  # Delete an RTI template
  delete:
    summary: Delete an RTI template
    operationId: deleteRTITemplate
    description: Permanently deletes an RTI template by UUID. Returns 204 No Content on success. If the resource is linked with some other resources, cannot be deleted.
    tags:
      - RTI Templates
    security:
      - opaqueBearerToken: []
    parameters:
      - $ref: "../components/parameters/object.yaml#/ObjectId"
    responses:
      "204":
        description: RTI template deleted successfully. No content returned.
      "401":
        $ref: "../components/responses/Errors.yaml#/Unauthorized"
      "404":
        $ref: "../components/responses/Errors.yaml#/NotFound"
      "409":
        $ref: "../components/responses/Errors.yaml#/Conflict"
      "500":
        $ref: "../components/responses/Errors.yaml#/InternalServerError"
