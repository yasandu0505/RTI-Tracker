InstitutionRequest:
  type: object
  required:
    - name
  properties:
    name:
      type: string
      example: Minister of X
      description: Human-readable institution name

InstitutionResponse:
  type: object
  properties:
    id:
      type: string
      format: uuid
      example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
      description: Unique identifier of the institution.
    name:
      type: string
      example: Minister of X
      description: name of the institution.
    createdAt:
      type: string
      format: date-time
      example: "2026-03-31T09:00:00Z"
      description: ISO 8601 timestamp of when the institution was created (UTC).
    updatedAt:
      type: string
      format: date-time
      example: "2026-03-31T09:00:00Z"
      description: ISO 8601 timestamp of when the institution was last updated (UTC).

InstitutionsListResponse:
  type: object
  properties:
    data:
      type: array
      items:
        $ref: "#/InstitutionResponse"
      description: List of institutions for the current page.
    pagination:
      $ref: "common.yaml#/Pagination"
