Pagination:
  type: object
  properties:
    page:
      type: integer
      minimum: 1
      example: 1
      description: Current page number (1-indexed).
    pageSize:
      type: integer
      minimum: 1
      maximum: 100
      example: 20
      description: Number of items per page.
    totalItems:
      type: integer
      example: 84
      description: Total number of RTI templates available.
    totalPages:
      type: integer
      example: 5
      description: Total number of pages based on pageSize.

ErrorResponse:
  type: object
  properties:
    status:
      type: integer
      example: 400
      description: HTTP status code.
    error:
      type: string
      example: Bad Request
      description: Short error category.
    message:
      type: string
      example: "Validation failed: title is required."
      description: Human-readable error detail.
    timestamp:
      type: string
      format: date-time
      example: "2026-03-31T09:00:00Z"
      description: ISO 8601 timestamp of when the error occurred (UTC).
