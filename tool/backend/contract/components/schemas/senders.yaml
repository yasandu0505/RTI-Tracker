SenderResponse:
  type: object
  required:
    - name
    - email
  properties:
    id:
      type: string
      format: uuid
      readOnly: true
      example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
      description: Unique identifier of the sender.
    name:
      type: string
      example: John Doe
      description: name of the sender.
    email:
      type: string
      example: example@gmail.com
      description: Email of the sender.
    address:
      type: string
      example: 123 Main St, Colombo 01
      description: Address of the sender.
    contactNumber:
      type: string
      example: "0771234567"
      description: Contact number of the sender.
    createdAt:
      type: string
      format: date-time
      readOnly: true
      example: "2026-03-31T09:00:00Z"
      description: ISO 8601 timestamp of when the sender was created (UTC).
    updatedAt:
      type: string
      format: date-time
      readOnly: true
      example: "2026-03-31T09:00:00Z"
      description: ISO 8601 timestamp of when the sender was last updated (UTC).

SenderRequest:
  type: object
  required:
    - name
    - email
  properties:
    name:
      type: string
      example: John Doe
      description: name of the sender.
    email:
      type: string
      example: example@gmail.com
      description: Email of the sender.
    address:
      type: string
      example: 123 Main St, Colombo 01
      description: Address of the sender.
    contactNumber:
      type: string
      example: "0771234567"
      description: Contact number of the sender.

SenderListResponse:
  type: object
  properties:
    data:
      type: array
      items:
        $ref: "#/SenderResponse"
      description: List of senders for the current page.
    pagination:
      $ref: "common.yaml#/Pagination"