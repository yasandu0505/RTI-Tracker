RTITemplateRequest:
  type: object
  required:
    - title
    - file
  properties:
    title:
      type: string
      example: Freedom of Information Request Template
      description: Human-readable title for the RTI template.
    description:
      type: string
      example: A standard template for filing RTI requests related to public expenditure.
      description: Detailed description of the RTI template.
    file:
      type: string
      format: binary
      description: Template document to upload (Markdown file). Will be stored on GitHub.

RTITemplateResponse:
  type: object
  properties:
    id:
      type: string
      format: uuid
      example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
      description: Unique identifier of the RTI template.
    title:
      type: string
      example: Freedom of Information Request Template
      description: Title of the RTI template.
    description:
      type: string
      example: A standard template for filing RTI requests related to public expenditure.
      description: Description of the RTI template.
    file:
      type: string
      example: templates/3fa85f64.md
      description: Relative path to the uploaded file.
    createdAt:
      type: string
      format: date-time
      example: "2026-03-31T09:00:00Z"
      description: ISO 8601 timestamp of when the template was created (UTC).
    updatedAt:
      type: string
      format: date-time
      example: "2026-03-31T09:00:00Z"
      description: ISO 8601 timestamp of when the template was last updated (UTC).

RTITemplateListResponse:
  type: object
  properties:
    data:
      type: array
      items:
        $ref: "#/RTITemplateResponse"
      description: List of RTI templates for the current page.
    pagination:
      $ref: "common.yaml#/Pagination"
