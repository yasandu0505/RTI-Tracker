PageParam:
  name: page
  in: query
  required: false
  description: Page number to retrieve (1-indexed). Defaults to 1.
  schema:
    type: integer
    minimum: 1
    default: 1
  example: 1

PageSizeParam:
  name: pageSize
  in: query
  required: false
  description: Number of items per page. Defaults to 20, maximum 100.
  schema:
    type: integer
    minimum: 1
    maximum: 100
    default: 20
  example: 20
