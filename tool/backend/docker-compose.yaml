# Base docker-compose.yaml (Common settings)
services:
  # fastapi server
  server:
    build: .
    container_name: rti-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    # NOTE: POSTGRES_HOST should be provided by environment or .env

  tests:
    build: .
    container_name: rti-backend-tests 
    profiles:
      - test
    volumes:
      - .:/app
    command: uv run pytest
    
